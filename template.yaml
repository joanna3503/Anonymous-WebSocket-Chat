AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Anonymous WebSocket Chat - Serverless Backend

Parameters:
  OllamaBaseUrl:
    Type: String
    Default: http://localhost:11434
    Description: Public base URL for the Ollama server used by the private AI chat Lambda.
  OllamaModel:
    Type: String
    Default: llama3.2
    Description: Ollama model ID used by the private AI chat Lambda.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: !Ref ConnectionsTable
        OLLAMA_BASE_URL: !Ref OllamaBaseUrl
        OLLAMA_MODEL: !Ref OllamaModel
        AI_SYSTEM_PROMPT: "You are a friendly, concise AI assistant in a private anonymous chat. Always reply in Traditional Chinese used in Taiwan."

Resources:
  # --- WebSocket API ---
  ChatWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: AnonymousChatWebSocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  # --- DynamoDB ---
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ChatConnections
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # --- Routes ---
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: "$connect"
      AuthorizationType: NONE
      Target: !Sub "integrations/${ConnectIntegration}"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: "$disconnect"
      AuthorizationType: NONE
      Target: !Sub "integrations/${DisconnectIntegration}"

  SendMessageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: "sendMessage"
      AuthorizationType: NONE
      Target: !Sub "integrations/${SendMessageIntegration}"

  MarkAsReadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: "markAsRead"
      AuthorizationType: NONE
      Target: !Sub "integrations/${MarkAsReadIntegration}"

  AskAIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: "askAI"
      AuthorizationType: NONE
      Target: !Sub "integrations/${AskAIIntegration}"

  # --- Integrations ---
  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectFunction.Arn}/invocations"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}/invocations"

  SendMessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SendMessageFunction.Arn}/invocations"

  MarkAsReadIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReadMessageFunction.Arn}/invocations"

  AskAIIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AskAIFunction.Arn}/invocations"

  # --- Stage ---
  ProdStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ChatWebSocketApi
      StageName: prod
      AutoDeploy: true

  # --- Lambda Functions ---
  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chat-connect
      Handler: connect.handler
      CodeUri: lambda/connect/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chat-disconnect
      Handler: disconnect.handler
      CodeUri: lambda/disconnect/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  SendMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chat-send-message
      Handler: send_message.handler
      CodeUri: lambda/send_message/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  ReadMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chat-read-message
      Handler: read_message.handler
      CodeUri: lambda/read_message/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  AskAIFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chat-ask-ai
      Handler: ask_ai.handler
      CodeUri: lambda/ask_ai/
      Timeout: 30
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  # --- Lambda Permissions (allow API Gateway to invoke) ---
  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/$connect"

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/$disconnect"

  SendMessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SendMessageFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/sendMessage"

  ReadMessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ReadMessageFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/markAsRead"

  AskAIPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AskAIFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/askAI"
  
Outputs:
  WebSocketUrl:
    Description: "WebSocket API endpoint"
    Value: !Sub "wss://${ChatWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  ConnectionsTableName:
    Description: "DynamoDB table name"
    Value: !Ref ConnectionsTable
